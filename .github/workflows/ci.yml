name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check package can be imported
        run: |
          cd packages/threejs-mcp
          node --input-type=module <<< "
            import './src/knowledge-base.js';
            console.log('knowledge-base.js OK');
          "

      - name: Verify bin entry exists
        run: |
          test -f packages/threejs-mcp/src/index.js && echo "bin entry OK"

      - name: Check changeset present (skip for bots)
        if: github.actor != 'github-actions[bot]'
        run: npx changeset status --since=origin/main
